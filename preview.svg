<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#f9fafb"/>
  
  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="#1D9E75"/>
  
  <!-- Center card -->
  <rect x="100" y="80" width="1000" height="470" rx="24" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Green circle icon -->
  <circle cx="600" cy="210" r="70" fill="#E1F5EE"/>
  
  <!-- Clipboard icon -->
  <rect x="570" y="175" width="60" height="70" rx="6" fill="#1D9E75"/>
  <rect x="582" y="168" width="36" height="16" rx="8" fill="#0F6E56"/>
  <line x1="582" y1="200" x2="618" y2="200" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="582" y1="215" x2="618" y2="215" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="582" y1="230" x2="605" y2="230" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="605,228 612,235 625,220" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="600" y="330" font-family="Cairo, Arial, sans-serif" font-size="52" font-weight="700" fill="#1a1a1a" text-anchor="middle">استفتاء التجار</text>
  
  <!-- Subtitle -->
  <text x="600" y="395" font-family="Cairo, Arial, sans-serif" font-size="28" fill="#6b7280" text-anchor="middle">١٠ أسئلة سريعة — دقيقتان بس</text>

  <!-- Badge -->
  <rect x="460" y="430" width="280" height="50" rx="25" fill="#E1F5EE"/>
  <text x="600" y="462" font-family="Cairo, Arial, sans-serif" font-size="22" font-weight="600" fill="#0F6E56" text-anchor="middle">ساعدنا نفهم تحدياتك</text>

  <!-- Bottom dots decoration -->
  <circle cx="480" cy="530" r="6" fill="#1D9E75" opacity="0.3"/>
  <circle cx="510" cy="530" r="6" fill="#1D9E75" opacity="0.5"/>
  <circle cx="540" cy="530" r="6" fill="#1D9E75" opacity="0.7"/>
  <circle cx="570" cy="530" r="6" fill="#1D9E75"/>
  <circle cx="600" cy="530" r="8" fill="#1D9E75"/>
  <circle cx="630" cy="530" r="6" fill="#1D9E75"/>
  <circle cx="660" cy="530" r="6" fill="#1D9E75" opacity="0.7"/>
  <circle cx="690" cy="530" r="6" fill="#1D9E75" opacity="0.5"/>
  <circle cx="720" cy="530" r="6" fill="#1D9E75" opacity="0.3"/>
</svg>
