<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استفتاء التجار</title>
<meta property="og:title" content="استفتاء التجار" />
<meta property="og:description" content="10 أسئلة سريعة عن تنظيم المواعيد — دقيقتان بس! ساعدنا نفهم تحدياتك." />
<meta property="og:image" content="https://fiftycards50-ctrl.github.io/survey2/preview.png" />
<meta property="og:url" content="https://fiftycards50-ctrl.github.io/survey2" />
<meta property="og:type" content="website" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE; --green-mid: #9FE1CB; --text: #1a1a1a; --text-muted: #6b7280; --border: #e5e7eb; --bg: #f9fafb; --white: #ffffff; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; fill: white; }
  header h1 { font-size: 16px; font-weight: 600; }
  .container { max-width: 580px; margin: 0 auto; padding: 2rem 1.25rem; flex: 1; }
  .intro-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem; margin-bottom: 1.5rem; text-align: center; }
  .badge { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin-bottom: 12px; }
  .intro-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.5; }
  .intro-card p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  .progress-wrap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
  .progress-track { flex: 1; height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--green-dark); white-space: nowrap; }
  .question-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem; margin-bottom: 1.25rem; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-num { font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.6; margin-bottom: 1.25rem; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; background: var(--white); font-family: 'Cairo', sans-serif; font-size: 14px; color: var(--text); width: 100%; }
  .opt:hover { border-color: var(--green-mid); background: #f8fffe; }
  .opt.selected { border-color: var(--green); background: var(--green-light); color: var(--green-dark); font-weight: 600; }
  .opt-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .opt.selected .opt-radio { border-color: var(--green); background: var(--green); }
  .opt.selected .opt-radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; }
  .nav-btns { display: flex; gap: 12px; }
  .btn { padding: 12px 24px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: var(--white); color: var(--text); }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--green); color: white; border-color: var(--green); flex: 1; }
  .btn.primary:hover { background: var(--green-dark); }
  .btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .center-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 2rem; text-align: center; margin-bottom: 1.25rem; }
  .score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--green-light); border: 3px solid var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .score-num { font-size: 28px; font-weight: 700; color: var(--green-dark); line-height: 1; }
  .score-unit { font-size: 12px; color: var(--green); font-weight: 600; }
  .center-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .center-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .detail-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; }
  .detail-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); }
  .result-row { margin-bottom: 14px; }
  .result-row:last-child { margin-bottom: 0; }
  .result-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .result-q { font-size: 13px; line-height: 1.5; flex: 1; }
  .result-a { font-size: 12px; font-weight: 600; color: var(--green-dark); white-space: nowrap; }
  .bar-bg { height: 5px; background: var(--bg); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.8s ease; }
  .share-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; text-align: center; }
  .share-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }
  .copy-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; word-break: break-all; direction: ltr; text-align: left; }
  .copy-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid var(--green); background: var(--green-light); color: var(--green-dark); font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { background: var(--green); color: white; }
  footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); background: var(--white); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>
  <h1>استفتاء التجار</h1>
</header>
<div class="container">
  <div class="intro-card" id="intro">
    <div class="badge">دقيقتان بس</div>
    <h2>ساعدنا نفهم تحدياتك كتاجر</h2>
    <p>10 أسئلة سريعة عن تنظيم المواعيد والطلبات. ما في إجابات صح أو غلط!</p>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog" style="width:10%"></div></div>
    <span class="progress-label" id="prog-label">1 / 10</span>
  </div>
  <div class="question-card" id="q-card">
    <div class="q-num" id="q-num">السؤال الأول</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="nav-btns" id="nav-btns">
    <button class="btn" id="back-btn" onclick="goBack()">رجوع</button>
    <button class="btn primary" id="next-btn" onclick="goNext()" disabled>التالي</button>
  </div>
  <div id="sending" class="center-card hidden"><p style="font-size:15px;color:var(--text-muted);">جاري إرسال نتائجك...</p></div>
  <div id="results" class="hidden">
    <div class="center-card">
      <div class="score-circle"><span class="score-num" id="final-pct">0</span><span class="score-unit">%</span></div>
      <h2 id="result-title">شكراً على مشاركتك!</h2>
      <p id="result-desc"></p>
    </div>
    <div class="detail-card">
      <h3>تفاصيل إجاباتك</h3>
      <div id="result-rows"></div>
    </div>
    <div class="share-card">
      <p>شارك الاستفتاء مع تجار ثانيين</p>
      <div class="copy-box" id="page-url"></div>
      <button class="copy-btn" onclick="copyLink()">نسخ الرابط</button>
    </div>
  </div>
</div>
<footer>جميع البيانات سرية</footer>
<script>
const FORMSPREE='https://formspree.io/f/xreyvrdr';
const nums=['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع','العاشر'];
const questions=[
  {q:"هل تعاني من صعوبة في تنظيم مواعيد عملاءك يومياً؟",opts:["نعم دائماً","أحياناً","نادراً","لا أبداً"],w:[4,3,1,0]},
  {q:"كيف تسجل مواعيدك وطلباتك حالياً؟",opts:["ورقة وقلم","واتساب فقط","إكسل أو شيت","تطبيق متخصص"],w:[4,3,2,0]},
  {q:"هل سبق أن نسيت موعد عميل بسبب الفوضى؟",opts:["نعم أكثر من مرة","مرة واحدة","لا لكن أخشى ذلك","لا أبداً"],w:[4,3,2,0]},
  {q:"كم من وقتك اليومي يذهب لتنظيم المواعيد والطلبات؟",opts:["أكثر من ساعة","30-60 دقيقة","15-30 دقيقة","أقل من 15 دقيقة"],w:[4,3,2,1]},
  {q:"هل يصعب عليك معرفة من راجعك ومن لم يراجعك بعد؟",opts:["نعم كثيراً","أحياناً","نادراً","لا، عندي طريقة واضحة"],w:[4,3,1,0]},
  {q:"هل تضيع عليك فرص بيع بسبب عدم المتابعة مع العميل؟",opts:["نعم بالتأكيد","ربما","نادراً","لا"],w:[4,3,1,0]},
  {q:"لو وفّرنا عليك أداة بسيطة توفر 30 دقيقة يومياً، هل ستستخدمها؟",opts:["نعم بدون تردد","ربما لو سهلة","أحتاج تجربها أولاً","لا مهتم"],w:[4,3,2,0]},
  {q:"هل سبق أن جربت أدوات لتنظيم المواعيد؟",opts:["نعم لكن معقدة","نعم لكن غالية","نعم وتركتها","لا لم أجرب"],w:[3,3,3,1]},
  {q:"ما أهمية سعر الأداة بالنسبة لك؟",opts:["المهم تحل المشكلة","مهم لكن ثانوي","السعر أولوية","لن أدفع أصلاً"],w:[4,3,2,0]},
  {q:"هل تنصح زملاءك التجار بأداة لو جربتها وأعجبتك؟",opts:["نعم بالتأكيد","ربما","نادراً","لا"],w:[4,2,1,0]}
];
let current=0,answers=new Array(questions.length).fill(null);
function render(){
  const q=questions[current];
  document.getElementById('q-num').textContent='السؤال '+nums[current];
  document.getElementById('q-text').textContent=q.q;
  const pct=Math.round((current+1)/questions.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=(current+1)+' / '+questions.length;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'+(answers[current]===i?' selected':'');
    btn.innerHTML='<span class="opt-radio"></span><span>'+o+'</span>';
    btn.onclick=()=>select(i);
    opts.appendChild(btn);
  });
  document.getElementById('next-btn').disabled=answers[current]===null;
  document.getElementById('next-btn').textContent=current===questions.length-1?'عرض النتائج':'التالي';
  document.getElementById('back-btn').disabled=current===0;
  document.getElementById('q-card').style.animation='none';
  setTimeout(()=>document.getElementById('q-card').style.animation='fadeIn 0.25s ease',10);
}
function select(i){
  answers[current]=i;
  document.querySelectorAll('.opt').forEach((b,j)=>b.classList.toggle('selected',j===i));
  document.getElementById('next-btn').disabled=false;
}
function goNext(){if(answers[current]===null)return;if(current<questions.length-1){current++;render();}else submitAndShow();}
function goBack(){if(current>0){current--;render();}}
async function submitAndShow(){
  ['q-card','nav-btns','progress-wrap','intro'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('sending').classList.remove('hidden');
  let total=0,maxTotal=0;
  answers.forEach((a,i)=>{if(a!==null){total+=questions[i].w[a];maxTotal+=4;}});
  const pct=Math.round(total/maxTotal*100);
  const formData=new FormData();
  formData.append('النسبة_الكلية',pct+'%');
  questions.forEach((q,i)=>{if(answers[i]!==null)formData.append(q.q,q.opts[answers[i]]);});
  try{await fetch(FORMSPREE,{method:'POST',body:formData,headers:{'Accept':'application/json'}});}catch(e){}
  document.getElementById('sending').classList.add('hidden');
  showResults(pct);
}
function showResults(pct){
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('final-pct').textContent=pct;
  let title,desc;
  if(pct>=70){title='تعاني من تحديات كبيرة في التنظيم';desc='إجاباتك تكشف إن تنظيم المواعيد يأخذ منك وقتاً ومجهوداً يومياً. أداة بسيطة ممكن تغير الكثير.';}
  else if(pct>=40){title='عندك بعض التحديات في التنظيم';desc='وضعك أفضل من كثيرين، لكن لا يزال في مجال للتحسين.';}
  else{title='تنظيمك جيد!';desc='يبدو إنك عندك طريقة واضحة في إدارة أعمالك.';}
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-desc').textContent=desc;
  const rows=document.getElementById('result-rows');
  rows.innerHTML='';
  questions.forEach((q,i)=>{
    const a=answers[i];if(a===null)return;
    const barPct=Math.round(q.w[a]/4*100);
    const div=document.createElement('div');
    div.className='result-row';
    div.innerHTML='<div class="result-row-top"><span class="result-q">'+q.q+'</span><span class="result-a">'+q.opts[a]+'</span></div><div class="bar-bg"><div class="bar-fill" style="width:0%" data-w="'+barPct+'"></div></div>';
    rows.appendChild(div);
  });
  setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+'%');},100);
  document.getElementById('page-url').textContent=window.location.href;
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='تم النسخ';
    setTimeout(()=>btn.textContent='نسخ الرابط',2000);
  });
}
render();
</script>
</body>
</html>
